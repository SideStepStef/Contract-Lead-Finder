openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Contract Lead Finder API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: leads
    description: Contract lead operations
  - name: stats
    description: Dashboard statistics
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /leads:
    get:
      operationId: listLeads
      tags: [leads]
      summary: List all contract leads
      parameters:
        - name: status
          in: query
          schema:
            type: string
        - name: category
          in: query
          schema:
            type: string
        - name: search
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of leads
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Lead"
    post:
      operationId: createLead
      tags: [leads]
      summary: Create a new lead
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LeadInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Lead"

  /leads/{id}:
    get:
      operationId: getLead
      tags: [leads]
      summary: Get a lead by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Lead details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Lead"
        "404":
          description: Not found
    patch:
      operationId: updateLead
      tags: [leads]
      summary: Update a lead
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LeadUpdate"
      responses:
        "200":
          description: Updated lead
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Lead"
        "404":
          description: Not found
    delete:
      operationId: deleteLead
      tags: [leads]
      summary: Delete a lead
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found

  /leads/stats:
    get:
      operationId: getLeadsStats
      tags: [stats]
      summary: Get dashboard statistics for leads
      responses:
        "200":
          description: Aggregated stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LeadsStats"

  /leads/recent:
    get:
      operationId: getRecentLeads
      tags: [leads]
      summary: Get recently added leads
      responses:
        "200":
          description: Recent leads
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Lead"

  /categories:
    get:
      operationId: listCategories
      tags: [leads]
      summary: List all available categories
      responses:
        "200":
          description: List of categories
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Category"

  /leads/{id}/notes:
    get:
      operationId: listLeadNotes
      tags: [leads]
      summary: List notes for a lead
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of notes
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Note"
        "404":
          description: Lead not found
    post:
      operationId: createLeadNote
      tags: [leads]
      summary: Add a note to a lead
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NoteInput"
      responses:
        "201":
          description: Created note
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Note"
        "404":
          description: Lead not found

  /opportunities/search:
    get:
      operationId: searchOpportunities
      tags: [opportunities]
      summary: Search SAM.gov contract opportunities
      parameters:
        - name: keyword
          in: query
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            default: 10
      responses:
        "200":
          description: List of opportunities from SAM.gov
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OpportunitiesResult"
        "503":
          description: SAM.gov API key not configured
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiKeyMissing"

  /opportunities/import:
    post:
      operationId: importOpportunity
      tags: [opportunities]
      summary: Import a SAM.gov opportunity as a lead
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OpportunityImportInput"
      responses:
        "201":
          description: Imported as a lead
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Lead"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    Lead:
      type: object
      required:
        - id
        - title
        - status
        - category
        - createdAt
      properties:
        id:
          type: integer
        title:
          type: string
        description:
          type: ["string", "null"]
        issuer:
          type: ["string", "null"]
        contractValue:
          type: ["number", "null"]
        deadline:
          type: ["string", "null"]
        category:
          type: string
        status:
          type: string
          enum: [new, researching, bidding, won, lost, archived]
        sourceUrl:
          type: ["string", "null"]
        notes:
          type: ["string", "null"]
        contactName:
          type: ["string", "null"]
        contactEmail:
          type: ["string", "null"]
        contactPhone:
          type: ["string", "null"]
        createdAt:
          type: string
        updatedAt:
          type: string

    LeadInput:
      type: object
      required:
        - title
        - category
      properties:
        title:
          type: string
          minLength: 1
        description:
          type: string
        issuer:
          type: string
        contractValue:
          type: number
        deadline:
          type: string
        category:
          type: string
        status:
          type: string
          enum: [new, researching, bidding, won, lost, archived]
        sourceUrl:
          type: string
        notes:
          type: string
        contactName:
          type: string
        contactEmail:
          type: string
        contactPhone:
          type: string

    LeadUpdate:
      type: object
      properties:
        title:
          type: string
          minLength: 1
        description:
          type: string
        issuer:
          type: string
        contractValue:
          type: number
        deadline:
          type: string
        category:
          type: string
        status:
          type: string
          enum: [new, researching, bidding, won, lost, archived]
        sourceUrl:
          type: string
        notes:
          type: string
        contactName:
          type: string
        contactEmail:
          type: string
        contactPhone:
          type: string

    LeadsStats:
      type: object
      required:
        - total
        - byStatus
        - totalPipelineValue
        - upcomingDeadlines
      properties:
        total:
          type: integer
        byStatus:
          type: array
          items:
            type: object
            required: [status, count]
            properties:
              status:
                type: string
              count:
                type: integer
        totalPipelineValue:
          type: number
        upcomingDeadlines:
          type: integer

    Category:
      type: object
      required:
        - name
        - count
      properties:
        name:
          type: string
        count:
          type: integer

    Note:
      type: object
      required:
        - id
        - leadId
        - content
        - createdAt
      properties:
        id:
          type: integer
        leadId:
          type: integer
        content:
          type: string
        createdAt:
          type: string

    NoteInput:
      type: object
      required:
        - content
      properties:
        content:
          type: string
          minLength: 1

    Opportunity:
      type: object
      required:
        - noticeId
        - title
        - postedDate
        - active
        - uiLink
      properties:
        noticeId:
          type: string
        title:
          type: string
        solicitationNumber:
          type: ["string", "null"]
        agency:
          type: ["string", "null"]
        postedDate:
          type: ["string", "null"]
        responseDeadLine:
          type: ["string", "null"]
        naicsCode:
          type: ["string", "null"]
        type:
          type: ["string", "null"]
        active:
          type: string
        awardAmount:
          type: ["number", "null"]
        uiLink:
          type: string

    OpportunitiesResult:
      type: object
      required:
        - opportunities
        - totalRecords
      properties:
        opportunities:
          type: array
          items:
            $ref: "#/components/schemas/Opportunity"
        totalRecords:
          type: integer

    ApiKeyMissing:
      type: object
      required:
        - error
        - setupUrl
      properties:
        error:
          type: string
        setupUrl:
          type: string

    OpportunityImportInput:
      type: object
      required:
        - noticeId
        - title
        - uiLink
      properties:
        noticeId:
          type: string
        title:
          type: string
        agency:
          type: ["string", "null"]
        responseDeadLine:
          type: ["string", "null"]
        naicsCode:
          type: ["string", "null"]
        type:
          type: ["string", "null"]
        awardAmount:
          type: ["number", "null"]
        uiLink:
          type: string
