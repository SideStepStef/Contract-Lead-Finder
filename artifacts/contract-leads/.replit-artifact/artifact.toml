kind = "web"
previewPath = "/"
title = "Contract Lead Finder"
version = "1.0.0"
id = "artifacts/contract-leads"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20471

[services.development]
run = "pnpm --filter @workspace/contract-leads run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/contract-leads", "run", "build" ]
publicDir = "artifacts/contract-leads/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20471"
BASE_PATH = "/"
